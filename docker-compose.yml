version: '3.9'

services:

  postgres:

    image: postgres:17

    container_name: task-portal-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: task_portal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  task-portal:

    build: .

    container_name: task-portal-app

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:

      DB_URL: jdbc:postgresql://postgres:5432/task_portal_db

      DB_USERNAME: postgres

      DB_PASSWORD: postgres

      JWT_SECRET: ${JWT_SECRET}

      GEMINI_API_KEY: ${GEMINI_API_KEY}

volumes:
  postgres_data: